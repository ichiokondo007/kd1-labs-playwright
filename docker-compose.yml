services:
  playwright:
    image: mcr.microsoft.com/playwright:v1.58.0-noble
    container_name: kd1-playwright-runner
    working_dir: /workspace
    volumes:
      - .:/workspace
    ipc: host
    init: true
    command: >
      bash -c "
        corepack enable &&
        exec su -s /bin/bash $(id -un ${UID:-1000}) -c '
          cd /workspace &&
          pnpm install --no-frozen-lockfile &&
          pnpm --filter @kd1-labs/e2e scheduler
        '
      "
    env_file:
      - path: ./apps/e2e/.env
        required: false
    environment:
      - CI=true
    extra_hosts:
      - "host.docker.internal:host-gateway"